<html>
    <head>
         <title>MYATS</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="result-container">

      <!-- HEADER -->
      <div class="result-header">

        <div class="nav-links">
          <a href="#">About</a>
          <a href="#">Contact Us</a>
          <a href="#">Track Resume Progress</a>
        </div>

        <div class="logo">
          MY<span>ATS</span>
        </div>

      </div>

      <!-- RESULT GRID -->
      <div class="result-grid">

        <!-- SCORE CARD -->
        <div class="card center-card">

          <h2>ATS Match Score</h2>

          <div class="score-circle">

            <div>
            <h1 id="matchScore">0%</h1>
              <div class="tags" id="matchedSkills">
            </div>

          </div>

        </div>

        <!-- BREAKDOWN -->
        <div class="card">

          <h2>Score Breakdown</h2>

          <div class="progress-group">

            <div class="progress-item">
              <div class="tags" id="matchedSkills">
                <span>Skills Match</span>
                <span>90%</span>
              </div>

              <div class="progress-bar">
                <div class="progress-fill w-90"></div>
              </div>
            </div>

            <div class="tags" id="missingSkills">
              <div class="progress-label">
                <span>Keyword Match</span>
                <span>80%</span>
              </div>

              <div class="progress-bar">
                <div class="progress-fill w-80"></div>
              </div>
            </div>

            <div class="progress-item">
              <div class="progress-label">
                <span>Experience Match</span>
                <span>85%</span>
              </div>

              <div class="progress-bar">
                <div class="progress-fill w-85"></div>
              </div>
            </div>

          </div>

        </div>

        <!-- SKILLS -->
        <div class="skills-column">

          

            <h2>Matched Skills</h2>

            <div class="tags">
              <div class="tags" id="matchedSkills">
            </div>

          </div>

          <div class="card">

            <h2>Missing Keywords</h2>

          <div class="tags" id="missingSkills">
            </div>

          </div>

        </div>

      </div>

      <!-- RECOMMENDATION -->
      <div class="card recommendation">

        <h2>Recommendations</h2>

      <ul id="recommendations">

      </div>

    </div>
    </body>
</html>
