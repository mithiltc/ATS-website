<!DOCTYPE html>
<html>
    <head>
         <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        
<nav class="navbar">

      <div class="nav-links">
        <a href="#">About</a>
        <a href="#">Contact Us</a>
        <a href="#">Track Resume Progress</a>
      </div>

      <div class="logo">
        MY<span>ATS</span>
      </div>

    </nav>

    <!-- MAIN CONTAINER -->
    <div class="main-container">

      <!-- INPUT SECTION -->
      <div class="input-grid">

        <div>
          <label>Company Name</label>
          <input type="text" placeholder="Enter company name">
        </div>

        <div>
          <label>Your Name</label>
          <input type="text" placeholder="Enter your full name">
        </div>

        <div>
          <label>Job Description</label>
          <textarea rows="3" placeholder="Paste job description here..."></textarea>
        </div>

      </div>

      <!-- DROP AREA -->
      <div class="drop-area">

        <div class="upload-icon">☁</div>

        <h2>Drag & Drop your resume here</h2>

        <p>PDF, DOCX only (Max. 10MB)</p>

        <span>or</span>

       <input
  type="file"
  id="resumeInput"
  accept=".pdf,.doc,.docx"
  hidden
/>

<button
  class="browse-btn"
  onclick="document.getElementById('resumeInput').click()"
>
  Browse Files
</button>

<p id="selectedFile"></p>

      </div>

      <!-- RESULT BUTTON -->
<a href="result.html">
 <button
  class="primary-btn"
  onclick="analyzeResume()"
>
  ✨ Analyze Resume
</button>
</a>
    </div>
    <script src="script.js"></script>
    </body>

</html>
